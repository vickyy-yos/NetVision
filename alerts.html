<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetVision — Alerts</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "index.html";
}
</script>

<div class="sidebar">
    <div class="sidebar-brand">
        <i class="ti ti-broadcast"></i>
        <h2>NetVision</h2>
        <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">
            <i class="ti ti-layout-sidebar-left-collapse" id="toggleIcon"></i>
        </button>
    </div>
    <ul>
        <li onclick="window.location.href='dashboard.html'"><i class="ti ti-chart-bar"></i><span> Dashboard</span></li>
        <li onclick="window.location.href='devices.html'"><i class="ti ti-server-2"></i><span> Devices</span></li>
        <li onclick="window.location.href='traffic.html'"><i class="ti ti-activity"></i><span> Traffic</span></li>
        <li class="active"><i class="ti ti-bell"></i><span> Alerts</span></li>
        <li class="logout" onclick="logout()"><i class="ti ti-logout"></i><span> Logout</span></li>
    </ul>
    <div class="system-status">
        <span class="status-dot"></span> System operational
    </div>
</div>

<div class="main">
    <div class="topbar">
        <h2>Alerts</h2>
        <div class="user-info">
            <span id="clock"></span>
            <button class="btn-icon" id="themeToggle" onclick="toggleTheme()" title="Toggle theme" style="font-size:18px"><i class="ti ti-sun" id="themeIcon"></i></button>
            <div class="user-chip" onclick="window.location.href='profile.html'">
                <span class="avatar">V</span>
                Vicky
            </div>
        </div>
    </div>

    <h1>Alert center</h1>

    <div class="cards">
        <div class="card">
            <div class="card-icon offline"><i class="ti ti-alert-triangle"></i></div>
            <p class="card-label">Active alerts</p>
            <p class="card-value offline" id="activeAlerts">0</p>
        </div>
        <div class="card">
            <div class="card-icon online"><i class="ti ti-circle-check"></i></div>
            <p class="card-label">Resolved today</p>
            <p class="card-value online" id="resolvedAlerts">0</p>
        </div>
        <div class="card">
            <div class="card-icon total"><i class="ti ti-server-2"></i></div>
            <p class="card-label">Offline devices</p>
            <p class="card-value" id="offlineCount">0</p>
        </div>
        <div class="card">
            <div class="card-icon ping"><i class="ti ti-clock"></i></div>
            <p class="card-label">Last checked</p>
            <p class="card-value" id="lastChecked" style="font-size:18px">--:--</p>
        </div>
    </div>

    <div class="section-header" style="margin-top:20px">
        <h2><i class="ti ti-alert-triangle"></i> Active alerts</h2>
        <button class="btn-secondary" onclick="refreshAlerts()"><i class="ti ti-refresh"></i> Refresh</button>
    </div>

    <div id="alertsList" style="display:flex;flex-direction:column;gap:10px;margin-top:4px"></div>

    <div class="section-header" style="margin-top:28px">
        <h2><i class="ti ti-history"></i> Alert history</h2>
    </div>

    <table id="historyTable" style="margin-top:4px">
        <thead>
            <tr>
                <th>Time</th>
                <th>Device</th>
                <th>Action</th>
                <th>By</th>
            </tr>
        </thead>
        <tbody id="historyBody"></tbody>
    </table>

</div>

<script src="app-alerts.js"></script>
<script>
function toggleSidebar(){
    const sidebar = document.querySelector('.sidebar');
    const icon = document.getElementById('toggleIcon');
    sidebar.classList.toggle('collapsed');
    icon.className = sidebar.classList.contains('collapsed')
        ? 'ti ti-layout-sidebar-left-expand'
        : 'ti ti-layout-sidebar-left-collapse';
}
function updateClock(){
    document.getElementById("clock").innerText = new Date().toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();
</script>
<script>
function toggleTheme(){
    const isLight = document.body.classList.toggle("light");
    localStorage.setItem("theme", isLight ? "light" : "dark");
    document.getElementById("themeIcon").className = isLight ? "ti ti-moon" : "ti ti-sun";
}
const savedTheme = localStorage.getItem("theme");
if(savedTheme === "light"){
    document.body.classList.add("light");
    document.getElementById("themeIcon").className = "ti ti-moon";
}
</script>
</body>
</html>
